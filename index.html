                    <option>Локально</option>

                <input type="text" placeholder="Искать самокат KUGO">
                <button class="search-btn"> <img src="./img/Search.svg" alt=""> </button>
            </div>

            <div class="cart-icons">
                <img src="./img/balance.svg" alt="">
                <img src="./img/Heart.svg" alt="">
                <div class="cart">
                    <img src="./img/shopping-cart.svg" alt="">
                    <p>Корзина</p>
                </div>
            </div>

        </div>
