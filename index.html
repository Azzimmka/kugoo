<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="contacts">
            <div class="navbar-contacts">
                <p>Сервис</p>
                <p>Сотрудничество</p>
                <p>Заказать званок</p>
                <div class="social-media">
                    <img src="./img/viber.svg" alt="">
                    <img src="./img/whatsup.svg" alt="">
                    <img src="./img/telegram.svg" alt="">
                </div>
            </div>

            <div class="phone-number">
                <p>+7 (800) 505-54-61</p>
                <img src="./img/plus.svg" alt="">
            </div>
        </div>
        <div class="search">
            <h1>KUGOO</h1>
            <button class="catalog">Каталог</button>

            <div class="input-elements">
                <select>
                    <option>Везде</option>
                    <option>Локально</option>
                </select>

                <input type="text" placeholder="Искать самокат KUGO">
                <button class="search-btn"> <img src="./img/Search.svg" alt=""> </button>
            </div>

            <div class="cart-icons">
                <img src="./img/balance.svg" alt="">
                <img src="./img/Heart.svg" alt="">
                <div class="cart">
                    <img src="./img/shopping-cart.svg" alt="">
                    <p>Корзина</p>
                </div>
            </div>

        </div>
    </header>

    <section class="section-1">
        <div class="father">
            <div class="card">
                <h4>Гарантия 1 год</h4>
                <p>на весь ассортимент</p>
            </div>
            <div class="card">
                <h4>рассрочка</h4>
                <p>от 6 месяцев</p>
            </div>
            <div class="card">
                <h4>Подарки</h4>
                <p>и бонусам к покупкам </p>
            </div>
            <div class="yandex">
                <img src="./img/Group 1657.svg" alt="">
            </div>
        </div>

        <div class="father-2">
            <h1>Электросамокаты</h1>
            <div class="btns">
                <button class="btn-1">Хиты продаж</button>
                <button class="btn-2">Для города</button>
                <button class="btn-3">Для взрослых</button>
                <button class="btn-4">Для детей</button>
            </div>
        </div>
    </section>


    <section>
        <div class="cards">
            <div class="card">
                <img src="./img/samokat.svg" alt="">

                <div>
                    <p class="xit">ХИТ</p>
                    <div class="ballance">
                        <img src="./img/balance.svg" alt="">
                    </div>
                </div>

                <h3 class="title">Kugoo Kirin M4</h3>

                <div class="content">
                    <div class="details">
                        <div class="detail">
                            <img src="./img/accumulator.svg" alt="">
                            <p>2000 mAh</p>
                        </div>

                        <div class="detail">
                            <img src="./img/power.svg" alt="">
                            <p>1,2 л.с.</p>
                        </div>
                        <br><br>
                        <div class="detail">
                            <img src="./img/speedometer.svg" alt="">
                            <p>60 км/ч</p>
                        </div>

                        <div class="detail">
                            <img src="./img/timer.svg" alt="">
                            <p>5 часов</p>
                        </div>
                    </div>

                    <div class="price-cart">
                        <div class="price">
                            <p>39 900 ₽</p>
                            <h4>29 900 ₽</h4>
                        </div>
                        <div class="cart">
                            <div>
                                <img src="./img/shopping-cart-2 1 (2).svg" alt="">
                            </div>

                            <div>
                                <img src="./img/heart2.svg" alt="">
                            </div>
                        </div>
                    </div>

                    <button class="btn">Купить в 1 клик</button>
                </div>
            </div>
        </div>
    </section>
    
</body>
</html>
